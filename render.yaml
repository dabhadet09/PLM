services:
  - type: web
    name: plm-api
    runtime: dotnet
    rootDir: PlmApi
    buildCommand: dotnet publish -c Release -o /app/publish
    startCommand: dotnet /app/publish/PlmApi.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: DOTNET_VERSION
        value: "10.0"
      - key: FRONTEND_URL
        value: https://plm-ui.onrender.com
    disk:
      name: plm-data
      mountPath: /data
      sizeGB: 1

  - type: static
    name: plm-ui
    rootDir: plm-ui
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://plm-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
        